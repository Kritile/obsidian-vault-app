name: Flutter CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.7
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  release-android:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.7
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: vellum-android
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  release-linux:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.7
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build linux --release
      - uses: actions/upload-artifact@v4
        with:
          name: vellum-linux
          path: build/linux/x64/release/bundle
          if-no-files-found: error

  release-windows:
    needs: quality
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.7
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter test test/core/encrypted_object_store_test.dart
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: vellum-windows
          path: build/windows/x64/runner/Release
          if-no-files-found: error
