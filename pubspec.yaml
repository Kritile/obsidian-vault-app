name: pavel_vault
description: Offline-first Flutter companion for an Obsidian vault synchronized over WebDAV.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  cryptography: ^2.8.1
  dio: ^5.9.0
  fl_chart: ^1.2.0
  file_picker: ^10.3.10
  flutter_markdown_plus: ^1.0.12
  flutter_secure_storage: ^10.3.1
  intl: ^0.20.2
  local_auth: ^3.0.2
  path: ^1.9.1
  path_provider: ^2.1.5
  pdf: ^3.11.3
  xml: ^6.6.1
  yaml: ^3.1.3
  yaml_edit: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
